name: Build RPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix)"
        required: false

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Stage Zig for container
        run: |
          set -euo pipefail
          ZIG_BIN="$(readlink -f "$(command -v zig)")"
          ZIG_DIR="$(dirname "$ZIG_BIN")"
          mkdir -p .github/zig-toolchain
          cp -a "$ZIG_DIR/." .github/zig-toolchain/
          .github/zig-toolchain/zig version

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages in openSUSE Tumbleweed container
        run: |
          set -euo pipefail
          docker run --rm \
            -e LIMUX_VERSION="${{ steps.version.outputs.version }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            opensuse/tumbleweed:latest \
            bash -lc '
              set -euo pipefail

              zypper refresh
              zypper install -y --no-confirm \
                binutils \
                cairo-devel \
                curl \
                dpkg \
                gcc \
                gcc-c++ \
                gettext-tools \
                gdk-pixbuf-devel \
                git \
                glib2-devel \
                gobject-introspection-devel \
                gzip \
                gtk4-devel \
                libadwaita-devel \
                libepoxy-devel \
                libxml2-tools \
                libsoup-devel \
                make \
                meson \
                ncurses-devel \
                ncurses-utils \
                ninja \
                pango-devel \
                pkgconf-pkg-config \
                python3-gobject \
                rpm-build \
                ruby \
                tar \
                "pkgconfig(webkitgtk-6.0)" \
                xz

              export PATH="/workspace/.github/zig-toolchain:$PATH"
              zig version

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"

              BLUEPRINT_VERSION=v0.20.4
              git clone --depth 1 --branch "$BLUEPRINT_VERSION" https://github.com/GNOME/blueprint-compiler.git /tmp/blueprint-compiler
              meson setup /tmp/blueprint-compiler/_build /tmp/blueprint-compiler --prefix /tmp/blueprint-prefix
              meson install -C /tmp/blueprint-compiler/_build
              export PATH="/tmp/blueprint-prefix/bin:$PATH"

              ./scripts/package.sh "$LIMUX_VERSION"
            '

      - name: Resolve RPM path
        id: rpm
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="$(uname -m)"
          RPM_ARCH="x86_64"
          [ "$ARCH" = "aarch64" ] && RPM_ARCH="aarch64"
          RPM_OUTPUT="dist/limux-${VERSION}-1.${RPM_ARCH}.rpm"
          test -f "$RPM_OUTPUT"
          echo "rpm_path=$RPM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "rpm_arch=$RPM_ARCH" >> "$GITHUB_OUTPUT"

      - name: Upload RPM to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.rpm.outputs.rpm_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: limux-rpm-${{ steps.version.outputs.version }}
          path: ${{ steps.rpm.outputs.rpm_path }}
          retention-days: 30
